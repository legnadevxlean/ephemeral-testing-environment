# Full monolithic pipeline for ephemeral QA environments
name: "01 - Run Ephemeral Tests"

permissions:
  contents: write
  pages: write
  id-token: write

on:
  push:
    branches: [main, qa]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      custom_id:
        description: "Custom Identifier (optional)"
        required: false
        type: string

env:
  TERRAFORM_VERSION: "1.14.4"
  PYTHON_VERSION: "3.11"

jobs:
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./app
          push: true
          tags: ${{ secrets.ACR_LOGIN_SERVER }}/ephemeral-qa-app:${{ github.event.inputs.custom_id || github.run_id }}

  deploy:
    name: Provision Infrastructure
    needs: build
    runs-on: ubuntu-latest
    outputs:
      app_url: ${{ steps.terraform.outputs.app_url }}
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Terraform Apply
        id: terraform
        working-directory: ./terraform
        run: |
          terraform init
          terraform apply -auto-approve \
            -var="run_id=${{ github.event.inputs.custom_id || github.run_id }}" \
            -var="environment=qa" \
            -var="container_image=${{ secrets.ACR_LOGIN_SERVER }}/ephemeral-qa-app:${{ github.event.inputs.custom_id || github.run_id }}" \
            -var="acr_login_server=${{ secrets.ACR_LOGIN_SERVER }}" \
            -var="acr_username=${{ secrets.ACR_USERNAME }}" \
            -var="acr_password=${{ secrets.ACR_PASSWORD }}"
          echo "app_url=$(terraform output -raw app_url)" >> $GITHUB_OUTPUT

      - name: Upload TF State
        uses: actions/upload-artifact@v4
        with:
          name: tfstate-${{ github.event.inputs.custom_id || github.run_id }}
          path: terraform/terraform.tfstate
          retention-days: 1

  test:
    name: Run E2E Tests
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          cd tests
          pip install -r requirements.txt

      - name: Behave Tests
        run: |
          cd tests
          behave -f allure_behave.formatter:AllureFormatter -o allure-results --junit --junit-directory junit-results
        env:
          BASE_URL: ${{ needs.deploy.outputs.app_url }}
          HEADLESS: true

      - name: Publish Test Summary
        uses: test-summary/action@v2
        with:
          paths: "tests/junit-results/*.xml"
        if: always()

      - name: Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: tests/allure-results

  cleanup:
    name: Destroy Infrastructure
    needs: [deploy, test]
    if: always() && needs.deploy.result == 'success'
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Download TF State
        uses: actions/download-artifact@v4
        with:
          name: tfstate-${{ github.event.inputs.custom_id || github.run_id }}
          path: terraform

      - name: Terraform Destroy
        working-directory: ./terraform
        run: |
          terraform init
          terraform destroy -auto-approve \
            -var="run_id=${{ github.event.inputs.custom_id || github.run_id }}" \
            -var="environment=qa" \
            -var="container_image=${{ secrets.ACR_LOGIN_SERVER }}/ephemeral-qa-app:${{ github.event.inputs.custom_id || github.run_id }}" \
            -var="acr_login_server=${{ secrets.ACR_LOGIN_SERVER }}" \
            -var="acr_username=${{ secrets.ACR_USERNAME }}" \
            -var="acr_password=${{ secrets.ACR_PASSWORD }}"

      - name: Verify Destruction
        run: |
          RG_NAME="rg-ephemeral-qa-${{ github.event.inputs.custom_id || github.run_id }}"
          echo "Verifying destruction of Resource Group: $RG_NAME"

          # Login to Azure to use CLI verification
          az login --service-principal -u ${{ secrets.ARM_CLIENT_ID }} -p ${{ secrets.ARM_CLIENT_SECRET }} --tenant ${{ secrets.ARM_TENANT_ID }}

          if az group exists --name "$RG_NAME" | grep -q "true"; then
            echo "Error: Resource Group $RG_NAME still exists after destruction attempt."
            exit 1
          else
            echo "Success: Resource Group $RG_NAME has been verified as deleted."
          fi

  report:
    name: Publish Allure Report
    needs: [deploy, test]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Allure History
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history
          keep_reports: true

      - name: Deploy to Gh-Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages

      - name: Output Summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "### 🚀 QA Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Status** | ${{ job.status }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target URL** | [${{ needs.deploy.outputs.app_url }}](${{ needs.deploy.outputs.app_url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Allure Report** | [📊 View Detailed Report]($REPORT_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Run ID** | \`${{ github.event.inputs.custom_id || github.run_id }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Note: Infrastructure has been automatically deprovisioned after testing.*" >> $GITHUB_STEP_SUMMARY
