name: Cleanup

on:
  workflow_call:
    inputs:
      run_id:
        required: true
        type: string
      environment:
        required: true
        type: string
      container_image:
        required: true
        type: string
      terraform_version:
        required: true
        type: string
    secrets:
      ARM_CLIENT_ID:
        required: true
      ARM_CLIENT_SECRET:
        required: true
      ARM_SUBSCRIPTION_ID:
        required: true
      ARM_TENANT_ID:
        required: true
      ACR_LOGIN_SERVER:
        required: true
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true

jobs:
  cleanup:
    name: Execute Cleanup
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.terraform_version }}
          terraform_wrapper: false

      - name: Recover Terraform State
        uses: actions/download-artifact@v4
        with:
          name: tfstate-${{ inputs.run_id }}
          path: terraform

      - name: Destroy Resources
        working-directory: ./terraform
        run: |
          terraform init
          terraform destroy -auto-approve \
            -var="run_id=${{ inputs.run_id }}" \
            -var="environment=${{ inputs.environment }}" \
            -var="container_image=${{ inputs.container_image }}" \
            -var="acr_login_server=${{ secrets.ACR_LOGIN_SERVER }}" \
            -var="acr_username=${{ secrets.ACR_USERNAME }}" \
            -var="acr_password=${{ secrets.ACR_PASSWORD }}"

      - name: Final Summary
        run: |
          echo "## Infrastructure Cleanup" >> $GITHUB_STEP_SUMMARY
          echo "All ephemeral resources have been successfully deprovisioned." >> $GITHUB_STEP_SUMMARY
