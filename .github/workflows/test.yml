# Target execution of automated tests against an existing environment
name: MANUAL - Run Tests against url

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: "Target URL to test (e.g., http://qa-app-123.westeurope.azurecontainer.io)"
        required: true
        type: string
      custom_tag:
        description: "Custom label/ID for the report (optional)"
        required: false
        type: string

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Run Tests
    uses: ./.github/workflows/reusable/test.yml
    with:
      target_url: ${{ inputs.target_url }}
      python_version: "3.11"
      execution_type: "Manual Regression"
      image_tag: ${{ inputs.custom_tag || 'N/A' }}
    secrets: inherit
