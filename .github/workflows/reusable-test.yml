name: "z- Reusable: Test"

on:
  workflow_call:
    inputs:
      target_url:
        required: true
        type: string
      python_version:
        required: true
        type: string
      execution_type:
        required: true
        type: string
      image_tag:
        required: false
        type: string
        default: "N/A"

jobs:
  test:
    name: Execute Tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          cd tests
          pip install -r requirements.txt

      - name: Run Behave tests
        run: |
          cd tests
          behave -f allure_behave.formatter:AllureFormatter -o allure-results --junit --junit-directory junit-results --no-capture
        env:
          BASE_URL: ${{ inputs.target_url }}
          HEADLESS: true

      - name: Publish Test Summary
        uses: test-summary/action@v2
        with:
          paths: "tests/junit-results/*.xml"
        if: always()

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: tests/allure-results
          retention-days: 30

  report:
    name: Publish Report
    runs-on: ubuntu-latest
    needs: test
    if: always()
    permissions:
      contents: write
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: allure-results
          path: allure-results

      - name: Get Allure history
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Allure Report Action
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          gh_pages: gh-pages
          allure_report: allure-report
          allure_history: allure-history

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          publish_branch: gh-pages

      - name: Output Report URL
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
          echo "### 🚀 Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target URL** | [${{ inputs.target_url }}](${{ inputs.target_url }}) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Allure Report** | [📊 View Detailed Report]($REPORT_URL) |" >> $GITHUB_STEP_SUMMARY
          echo "| **Image Tag** | \`${{ inputs.image_tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Execution Type** | \`${{ inputs.execution_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> 💡 *Note: The Allure Report may take a minute to update after the pipeline finishes.*" >> $GITHUB_STEP_SUMMARY
